<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0F0F0F" />
  <text x="50%" y="50%" font-family="Courier New, monospace" font-size="100" fill="#FF00FF" text-anchor="middle" dominant-baseline="middle" font-weight="bold" filter="url(#glow)">
    XENA
    <animate attributeName="fill" values="#FF00FF;#00FFFF;#FF00FF" dur="2s" repeatCount="indefinite" />
  </text>
  <path d="M100 350 L400 350" stroke="#00FFFF" stroke-width="5" />
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>